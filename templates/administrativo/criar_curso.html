<!-- criar_curso.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Criar Curso</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/dist/administrativo.css' %}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-lg">
      <a class="block text-green-600 font-bold hover:underline" href="{% url 'painel_administrativo' %}">← Voltar para o menu principal</a>
    <h1 class="text-3xl font-bold text-center mb-6">Criar Novo Curso</h1>

    <form method="post" class="flex flex-col gap-4">
      {% csrf_token %}

      <div>
        <label for="title" class="block font-semibold mb-1">Título do Curso:</label>
        <input
          type="text"
          id="title"
          name="title"
          required
          class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <div>
        <label for="description" class="block font-semibold mb-1">Descrição:</label>
        <textarea
          id="description"
          name="description"
          rows="5"
          required
          class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
        ></textarea>
      </div>

      <button
        type="submit"
        class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors"
      >
        Salvar Curso
      </button>
    </form>

    <a
      href="{% url 'ver_cursos' %}"
      class="block text-center mt-6 text-blue-600 hover:underline font-semibold"
    >
      ← Voltar para Lista de Cursos
    </a>
  </div>

</body>
</html>
